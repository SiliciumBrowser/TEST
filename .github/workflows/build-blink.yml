name: Build Blink Engine

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Build V8 Engine"]
    types:
      - completed

permissions:
  contents: write

jobs:
  build-blink:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Maximize build space
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc
        sudo rm -rf /usr/local/share/boost
        df -h
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git python3 lsb-release sudo
        
    - name: Setup depot_tools
      run: |
        git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git
        echo "$PWD/depot_tools" >> $GITHUB_PATH
        
    - name: Restore Chromium cache
      id: cache-chromium
      uses: actions/cache@v3
      with:
        path: |
          chromium
          !chromium/src/out
        key: chromium-source-${{ hashFiles('.github/workflows/build-blink.yml') }}
        restore-keys: |
          chromium-source-
        
    - name: Fetch Chromium source
      if: steps.cache-chromium.outputs.cache-hit != 'true'
      run: |
        mkdir chromium
        cd chromium
        fetch --nohooks --no-history chromium
        cd src
        gclient sync --no-history --shallow
        
    - name: Install build dependencies
      run: |
        cd chromium/src
        ./build/install-build-deps.sh --no-prompt --no-arm
        
    - name: Run hooks
      run: |
        cd chromium/src
        gclient runhooks
        
    - name: Download V8 artifacts
      uses: actions/download-artifact@v4
      with:
        name: v8-engine-build
        path: v8-artifacts
      continue-on-error: true
        
    - name: Apply custom patches
      run: |
        cd chromium/src
        
        # Apply Blink patches if exist
        if [ -d "../../patches/blink" ]; then
          for patch in ../../patches/blink/*.patch; do
            if [ -f "$patch" ]; then
              echo "Applying $patch..."
              git apply "$patch" || echo "Patch failed: $patch"
            fi
          done
        fi
        
    - name: Configure Blink build
      run: |
        cd chromium/src
        
        gn gen out/Release --args='
          is_debug=false
          is_component_build=true
          symbol_level=0
          blink_symbol_level=0
          enable_nacl=false
          remove_webcore_debug_symbols=true
          is_official_build=false
          use_thin_lto=false
          chrome_pgo_phase=0
          enable_precompiled_headers=false
        '
    
    - name: Build Blink
      run: |
        cd chromium/src
        
        # Build Blink components
        ninja -C out/Release \
          blink_core \
          blink_modules \
          blink_platform \
          blink_controller \
          -j$(nproc)
        
    - name: Package Blink artifacts
      run: |
        cd chromium/src/out/Release
        tar -czf ../../../../blink-build.tar.gz \
          obj/third_party/blink \
          *.so \
          *.pak
        
    - name: Upload Blink artifacts
      uses: actions/upload-artifact@v4
      with:
        name: blink-engine-build
        path: blink-build.tar.gz
        retention-days: 7
