name: Build SiliciumBrowser (Windows)

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 350
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Check disk space
      shell: powershell
      run: |
        Write-Host "Disk space before cleanup:"
        Get-PSDrive C | Select-Object Used,Free
    
    - name: Free up disk space
      shell: powershell
      run: |
        Write-Host "Removing unnecessary components..."
        
        if (Test-Path "C:\Android") {
          Remove-Item -Path "C:\Android" -Recurse -Force -ErrorAction SilentlyContinue
        }
        
        if (Test-Path "C:\Program Files\dotnet") {
          Remove-Item -Path "C:\Program Files\dotnet" -Recurse -Force -ErrorAction SilentlyContinue
        }
        
        if (Test-Path "$env:LOCALAPPDATA\Temp") {
          Remove-Item -Path "$env:LOCALAPPDATA\Temp\*" -Recurse -Force -ErrorAction SilentlyContinue
        }
        
        Write-Host "Disk space after cleanup:"
        Get-PSDrive C | Select-Object Used,Free
    
    - name: Install dependencies
      shell: powershell
      run: |
        if (!(Get-Command choco -ErrorAction SilentlyContinue)) {
          Set-ExecutionPolicy Bypass -Scope Process -Force
          [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.ServicePointManager]::SecurityProtocol -bor 3072
          iex ((New-Object System.Net.WebClient).DownloadString('https://community.chocolatey.org/install.ps1'))
        }
        
        choco install -y git python3 visualstudio2022buildtools visualstudio2022-workload-vctools
        
    - name: Setup depot_tools
      shell: powershell
      run: |
        git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git
        
        # Get absolute path
        $depotToolsPath = (Resolve-Path "depot_tools").Path
        Write-Host "Depot tools path: $depotToolsPath"
        
        # Add to PATH for this session
        $env:PATH = "$depotToolsPath;$env:PATH"
        
        # Set environment variable for depot_tools
        $env:DEPOT_TOOLS_WIN_TOOLCHAIN = "0"
        
        # Save to GITHUB_ENV for subsequent steps
        Add-Content $env:GITHUB_ENV "DEPOT_TOOLS_PATH=$depotToolsPath"
        Add-Content $env:GITHUB_PATH "$depotToolsPath"
        Add-Content $env:GITHUB_ENV "DEPOT_TOOLS_WIN_TOOLCHAIN=0"
        
        Write-Host "Environment variables set for all subsequent steps"
        
    - name: Restore Chromium source cache
      id: cache-chromium
      uses: actions/cache@v3
      with:
        path: |
          chromium
          !chromium/src/out
        key: chromium-windows-source-${{ github.run_number }}
        restore-keys: |
          chromium-windows-source-
    
    - name: Restore build artifacts cache
      id: cache-build
      uses: actions/cache@v3
      with:
        path: |
          chromium/src/out/Release/obj
          chromium/src/out/Release/*.lib
          chromium/src/out/Release/*.obj
        key: chromium-windows-build-${{ github.run_number }}
        restore-keys: |
          chromium-windows-build-
        
    - name: Fetch Chromium source
      if: steps.cache-chromium.outputs.cache-hit != 'true'
      shell: powershell
      run: |
        $env:DEPOT_TOOLS_WIN_TOOLCHAIN = "0"
        
        New-Item -ItemType Directory -Force -Path chromium
        Set-Location chromium
        
        fetch --nohooks --no-history chromium
        
    - name: Sync Chromium
      shell: powershell
      run: |
        $env:DEPOT_TOOLS_WIN_TOOLCHAIN = "0"
        
        Set-Location chromium\src
        gclient sync --no-history --shallow
        
    - name: Run gclient hooks
      shell: powershell
      run: |
        $env:DEPOT_TOOLS_WIN_TOOLCHAIN = "0"
        
        Set-Location chromium\src
        gclient runhooks
        
    - name: Copy custom resources
      shell: powershell
      run: |
        if (Test-Path "custom-ui\new-tab") {
          Write-Host "Copying custom new tab page..."
          New-Item -ItemType Directory -Force -Path "chromium\src\chrome\browser\resources\silicium_newtab"
          Copy-Item -Path "custom-ui\new-tab\*" -Destination "chromium\src\chrome\browser\resources\silicium_newtab\" -Recurse -Force
        }
        
        if (Test-Path "custom-resources\icons") {
          Write-Host "Copying custom icons..."
          Copy-Item -Path "custom-resources\icons\*" -Destination "chromium\src\chrome\app\theme\chromium\" -Force -ErrorAction SilentlyContinue
        }
        
    - name: Apply custom patches
      shell: powershell
      run: |
        Set-Location chromium\src
        
        if (Test-Path "..\..\patches") {
          Write-Host "Applying custom patches..."
          Get-ChildItem "..\..\patches\*.patch" | ForEach-Object {
            Write-Host "Applying $($_.Name)..."
            git apply $_.FullName
            if ($LASTEXITCODE -ne 0) {
              Write-Host "Warning: Patch failed: $($_.Name)"
            }
          }
        }
        
        if (Test-Path "..\..\custom-patches") {
          Write-Host "Applying custom patches..."
          Get-ChildItem "..\..\custom-patches\*.patch" | ForEach-Object {
            Write-Host "Applying $($_.Name)..."
            git apply $_.FullName
            if ($LASTEXITCODE -ne 0) {
              Write-Host "Warning: Patch failed: $($_.Name)"
            }
          }
        }
    
    - name: Configure build
      shell: powershell
      run: |
        $env:DEPOT_TOOLS_WIN_TOOLCHAIN = "0"
        
        Set-Location chromium\src
        
        if ("${{ github.event.inputs.build_type }}" -eq "debug") {
          $isDebug = "true"
          $isOfficial = "false"
        } else {
          $isDebug = "false"
          $isOfficial = "true"
        }
        
        New-Item -ItemType Directory -Force -Path out\Release
        
        $argsContent = "is_debug=$isDebug`n"
        $argsContent += "is_official_build=$isOfficial`n"
        $argsContent += "is_component_build=false`n"
        $argsContent += "symbol_level=0`n"
        $argsContent += "enable_nacl=false`n"
        $argsContent += "enable_widevine=true`n"
        $argsContent += "proprietary_codecs=true`n"
        $argsContent += 'ffmpeg_branding="Chrome"' + "`n"
        $argsContent += "use_thin_lto=false`n"
        $argsContent += "chrome_pgo_phase=0`n"
        $argsContent += 'target_os="win"' + "`n"
        $argsContent += 'target_cpu="x64"' + "`n"
        $argsContent += "is_chrome_branded=false`n"
        $argsContent += "remove_webcore_debug_symbols=true`n"
        $argsContent += "blink_symbol_level=0`n"
        $argsContent += "v8_symbol_level=0`n"
        $argsContent += "enable_hangout_services_extension=false`n"
        $argsContent += "enable_reporting=false`n"
        
        # Optimizations to prevent hanging
        $argsContent += "use_goma=false`n"
        $argsContent += "enable_precompiled_headers=false`n"
        $argsContent += "concurrent_links=1`n"
        
        Set-Content -Path out\Release\args.gn -Value $argsContent
        
        Write-Host "Build configuration:"
        Get-Content out\Release\args.gn
        
        gn gen out\Release
    
    - name: Verify build environment
      shell: powershell
      run: |
        $env:DEPOT_TOOLS_WIN_TOOLCHAIN = "0"
        
        Set-Location chromium\src
        
        Write-Host "Checking build tools..."
        Write-Host "Ninja version:"
        ninja --version
        
        Write-Host "`nGN version:"
        gn --version
        
        Write-Host "`nPython version:"
        python --version
        
        Write-Host "`nDisk space:"
        Get-PSDrive C | Select-Object Used,Free
        
        Write-Host "`nMemory:"
        Get-CimInstance Win32_OperatingSystem | Select-Object TotalVisibleMemorySize,FreePhysicalMemory
        
        Write-Host "`nEnvironment variables:"
        Write-Host "DEPOT_TOOLS_WIN_TOOLCHAIN=$env:DEPOT_TOOLS_WIN_TOOLCHAIN"
        
    - name: Build SiliciumBrowser
      shell: powershell
      continue-on-error: true
      id: build
      timeout-minutes: 330
      run: |
        $env:DEPOT_TOOLS_WIN_TOOLCHAIN = "0"
        
        Set-Location chromium\src
        
        Write-Host "Starting build at $(Get-Date)"
        Write-Host "Available CPU cores: $env:NUMBER_OF_PROCESSORS"
        Write-Host "Current directory: $PWD"
        
        # Reduce parallel jobs to avoid hanging
        $jobs = [Math]::Max(2, $env:NUMBER_OF_PROCESSORS - 1)
        Write-Host "Using $jobs parallel jobs"
        
        # Build with timeout monitoring
        $buildProcess = Start-Process -FilePath "ninja" -ArgumentList "-C","out\Release","chrome","-j$jobs","-v" -NoNewWindow -PassThru -RedirectStandardOutput "build.log" -RedirectStandardError "build-error.log"
        
        $timeout = 300 # 5 minutes per check
        $lastProgress = Get-Date
        $lastLineCount = 0
        
        while (!$buildProcess.HasExited) {
          Start-Sleep -Seconds 30
          
          # Check if build is making progress
          if (Test-Path "build.log") {
            $currentLineCount = (Get-Content "build.log" | Measure-Object -Line).Lines
            if ($currentLineCount -gt $lastLineCount) {
              $lastProgress = Get-Date
              $lastLineCount = $currentLineCount
              Write-Host "Build progress: $currentLineCount lines ($(Get-Date))"
            }
          }
          
          # Check if stuck (no progress for 5 minutes)
          $timeSinceProgress = (Get-Date) - $lastProgress
          if ($timeSinceProgress.TotalSeconds -gt $timeout) {
            Write-Host "Build appears stuck (no progress for $timeout seconds). Killing and retrying..."
            $buildProcess.Kill()
            
            # Show last lines of log
            if (Test-Path "build.log") {
              Write-Host "Last 20 lines of build log:"
              Get-Content "build.log" -Tail 20
            }
            
            Write-Host "Retrying build with fewer parallel jobs..."
            $jobs = 2
            ninja -C out\Release chrome -j$jobs -v
            break
          }
        }
        
        $buildProcess.WaitForExit()
        
        if ($buildProcess.ExitCode -ne 0) {
          Write-Host "Build failed or incomplete. Exit code: $($buildProcess.ExitCode)"
          
          # Show error log
          if (Test-Path "build-error.log") {
            Write-Host "Build errors:"
            Get-Content "build-error.log" -Tail 50
          }
          
          Write-Host "Checking disk space..."
          Get-PSDrive C | Select-Object Used,Free
          exit 1
        }
        
        Write-Host "Build completed at $(Get-Date)"
    
    - name: Save build artifacts (on timeout or completion)
      if: always()
      shell: powershell
      run: |
        Write-Host "Saving build artifacts..."
        
        if (Test-Path "chromium\src\out\Release\obj") {
          $objSize = (Get-ChildItem -Path "chromium\src\out\Release\obj" -Recurse | Measure-Object -Property Length -Sum).Sum / 1GB
          Write-Host "Build artifacts size: $([math]::Round($objSize, 2)) GB"
        }
        
        Write-Host "Build artifacts will be cached for next run"
    
    - name: Upload partial build artifacts
      if: failure() || cancelled()
      uses: actions/upload-artifact@v4
      with:
        name: partial-build-windows-${{ github.run_number }}
        path: |
          chromium/src/out/Release/obj/**/*.lib
          chromium/src/out/Release/obj/**/*.obj
          chromium/src/out/Release/*.lib
        retention-days: 7
    
    - name: Package build cache for local development
      if: always()
      shell: powershell
      run: |
        Write-Host "Creating build cache package..."
        
        Set-Location chromium\src\out\Release
        
        # Create cache directory
        New-Item -ItemType Directory -Force -Path build-cache
        
        # Copy all .lib files
        Write-Host "Copying .lib files..."
        Get-ChildItem -Path obj -Recurse -Filter *.lib | ForEach-Object {
          $relativePath = $_.FullName.Substring((Get-Location).Path.Length + 1)
          $targetPath = Join-Path "build-cache" $relativePath
          $targetDir = Split-Path $targetPath -Parent
          New-Item -ItemType Directory -Force -Path $targetDir | Out-Null
          Copy-Item $_.FullName $targetPath
        }
        
        # Copy all .obj files (sample - not all, too large)
        Write-Host "Copying critical .obj files..."
        Get-ChildItem -Path obj -Recurse -Filter *.obj | Where-Object {
          $_.FullName -match "(chrome|browser|content|blink|v8)" 
        } | ForEach-Object {
          $relativePath = $_.FullName.Substring((Get-Location).Path.Length + 1)
          $targetPath = Join-Path "build-cache" $relativePath
          $targetDir = Split-Path $targetPath -Parent
          New-Item -ItemType Directory -Force -Path $targetDir | Out-Null
          Copy-Item $_.FullName $targetPath
        }
        
        # Create info file
        $buildType = "${{ github.event.inputs.build_type }}"
        $runNumber = "${{ github.run_number }}"
        $buildDate = Get-Date
        
        $buildInfo = "Build Cache Information`n"
        $buildInfo += "=======================`n"
        $buildInfo += "Build Date: $buildDate`n"
        $buildInfo += "Build Type: $buildType`n"
        $buildInfo += "Platform: Windows x64`n"
        $buildInfo += "Run Number: $runNumber`n`n"
        $buildInfo += "Usage:`n"
        $buildInfo += "1. Extract this archive to chromium/src/out/Release/`n"
        $buildInfo += "2. Apply your patches`n"
        $buildInfo += "3. Run: ninja -C out\Release chrome`n"
        $buildInfo += "4. Only modified files will be rebuilt`n`n"
        $buildInfo += "Note: This cache contains compiled object files (.lib, .obj)`n"
        $buildInfo += "to speed up incremental builds on your local machine.`n"
        
        Set-Content -Path "build-cache\BUILD_CACHE_INFO.txt" -Value $buildInfo
        
        # Create ZIP
        Write-Host "Creating ZIP archive..."
        Compress-Archive -Path build-cache\* -DestinationPath ..\..\..\..\build-cache-windows.zip -Force
        
        $zipSize = (Get-Item ..\..\..\..\build-cache-windows.zip).Length / 1MB
        Write-Host "Build cache size: $([math]::Round($zipSize, 2)) MB"
    
    - name: Upload build cache
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-cache-windows-${{ github.run_number }}
        path: build-cache-windows.zip
        retention-days: 30
        
    - name: Package SiliciumBrowser
      if: steps.build.outcome == 'success'
      shell: powershell
      run: |
        Set-Location chromium\src\out\Release
        
        New-Item -ItemType Directory -Force -Path silicium-browser
        
        Copy-Item chrome.exe silicium-browser\silicium-browser.exe
        Copy-Item -Recurse locales silicium-browser\ -ErrorAction SilentlyContinue
        Copy-Item -Recurse resources silicium-browser\ -ErrorAction SilentlyContinue
        Copy-Item *.pak silicium-browser\ -ErrorAction SilentlyContinue
        Copy-Item *.bin silicium-browser\ -ErrorAction SilentlyContinue
        Copy-Item *.dll silicium-browser\ -ErrorAction SilentlyContinue
        Copy-Item -Recurse swiftshader silicium-browser\ -ErrorAction SilentlyContinue
        Copy-Item icudtl.dat silicium-browser\ -ErrorAction SilentlyContinue
        Copy-Item v8_context_snapshot.bin silicium-browser\ -ErrorAction SilentlyContinue
        
        if (Test-Path "chrome\browser\resources\silicium_newtab") {
          Copy-Item -Recurse chrome\browser\resources\silicium_newtab silicium-browser\
        }
        
        Compress-Archive -Path silicium-browser\* -DestinationPath ..\..\..\silicium-browser-windows.zip -Force
        
        Write-Host "Package size:"
        Get-Item ..\..\..\silicium-browser-windows.zip | Select-Object Name,Length
        
    - name: Upload build artifacts
      if: steps.build.outcome == 'success'
      uses: actions/upload-artifact@v4
      with:
        name: silicium-browser-windows-${{ github.event.inputs.build_type }}
        path: silicium-browser-windows.zip
        retention-days: 30
        
    - name: Create Release
      if: steps.build.outcome == 'success' && github.event_name == 'workflow_dispatch'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v1.0.0-windows-${{ github.run_number }}
        name: SiliciumBrowser Windows v1.0.0-${{ github.run_number }}
        body: |
          ## SiliciumBrowser Windows Build
          
          **Build Type:** ${{ github.event.inputs.build_type }}
          **Platform:** Windows x64
          
          ### Installation
          1. Extract silicium-browser-windows.zip
          2. Run silicium-browser.exe
        files: silicium-browser-windows.zip
        draft: false
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
