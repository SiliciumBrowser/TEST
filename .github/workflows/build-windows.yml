name: 🎨 Custom Chromium Builder (Windows)

on:
  workflow_dispatch:
    inputs:
      customizations:
        description: 'Tùy chỉnh (chọn nhiều, cách nhau bởi dấu phẩy)'
        required: true
        default: 'ui-theme,adblock,privacy,extensions'
        type: string
      theme_color:
        description: 'Màu chủ đạo (hex code)'
        required: false
        default: '#1a73e8'
        type: string
      browser_name:
        description: 'Tên trình duyệt'
        required: false
        default: 'My Custom Browser'
        type: string

permissions:
  contents: write

jobs:
  build-custom-chromium-windows:
    runs-on: windows-latest
    timeout-minutes: 30
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Download Chrome for Windows
      shell: pwsh
      run: |
        Write-Host "📥 Downloading Google Chrome for Windows..."
        $url = "https://dl.google.com/chrome/install/latest/chrome_installer.exe"
        Invoke-WebRequest -Uri $url -OutFile chrome_installer.exe
        
        # Extract Chrome
        Write-Host "📦 Extracting Chrome..."
        Start-Process -FilePath "chrome_installer.exe" -ArgumentList "/silent /install" -Wait -NoNewWindow
        
        # Copy Chrome files
        $chromePath = "$env:ProgramFiles\Google\Chrome\Application"
        if (Test-Path $chromePath) {
          Copy-Item -Path $chromePath -Destination "chromium" -Recurse
          Write-Host "✅ Chrome extracted to chromium/"
        } else {
          Write-Host "⚠️ Trying alternative method..."
          # Download portable version
          $portableUrl = "https://github.com/portapps/portapps/releases/download/chrome-stable-131.0.6778.86-1/chrome-portable-win64-131.0.6778.86-1.7z"
          Invoke-WebRequest -Uri "https://www.7-zip.org/a/7z2301-x64.exe" -OutFile 7z.exe
          Start-Process -FilePath "7z.exe" -ArgumentList "/S" -Wait
          
          # Try ungoogled chromium
          Write-Host "📥 Downloading Ungoogled Chromium..."
          $apiUrl = "https://api.github.com/repos/ungoogled-software/ungoogled-chromium-binaries/releases/latest"
          $release = Invoke-RestMethod -Uri $apiUrl
          $asset = $release.assets | Where-Object { $_.name -like "*windows*x64*.zip" } | Select-Object -First 1
          
          if ($asset) {
            Invoke-WebRequest -Uri $asset.browser_download_url -OutFile chromium.zip
            Expand-Archive -Path chromium.zip -DestinationPath chromium
            Write-Host "✅ Ungoogled Chromium downloaded"
          }
        }
        
    - name: 🎨 Apply UI Theme
      if: contains(inputs.customizations, 'ui-theme')
      shell: pwsh
      run: |
        Write-Host "🎨 Applying custom UI theme via policies..."
        
        # Create policies directory
        New-Item -ItemType Directory -Force -Path "chromium\policies"
        
        # Create managed policies (works without developer mode)
        $policies = @'
        {
          "BrowserThemeColor": "${{ inputs.theme_color }}",
          "CustomCSSEnabled": true,
          "ScrollbarColor": "${{ inputs.theme_color }}"
        }
        '@
        Set-Content -Path "chromium\policies\policies.json" -Value $policies
        
        # Create user stylesheet (works without extensions)
        New-Item -ItemType Directory -Force -Path "chromium\Default\User StyleSheets"
        $userCSS = @'
        /* Custom User Stylesheet - No extension needed */
        ::-webkit-scrollbar {
          width: 12px;
        }
        
        ::-webkit-scrollbar-track {
          background: #f1f1f1;
        }
        
        ::-webkit-scrollbar-thumb {
          background: ${{ inputs.theme_color }};
          border-radius: 6px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
          background: ${{ inputs.theme_color }}dd;
        }
        
        ::selection {
          background: ${{ inputs.theme_color }}66;
          color: white;
        }
        
        ::-moz-selection {
          background: ${{ inputs.theme_color }}66;
          color: white;
        }
        '@
        Set-Content -Path "chromium\Default\User StyleSheets\Custom.css" -Value $userCSS
        
        Write-Host "✅ Theme applied via policies and user stylesheet"
        
    - name: 🚫 Add AdBlock
      if: contains(inputs.customizations, 'adblock')
      shell: pwsh
      run: |
        Write-Host "🚫 Adding AdBlock via hosts and policies..."
        
        # Create adblock hosts file
        $hosts = @'
        # Ad servers - Block via hosts
        0.0.0.0 doubleclick.net
        0.0.0.0 googleadservices.com
        0.0.0.0 googlesyndication.com
        0.0.0.0 google-analytics.com
        0.0.0.0 ads.facebook.com
        0.0.0.0 ads.twitter.com
        0.0.0.0 pagead2.googlesyndication.com
        0.0.0.0 adservice.google.com
        0.0.0.0 www.googletagmanager.com
        0.0.0.0 www.google-analytics.com
        0.0.0.0 ssl.google-analytics.com
        0.0.0.0 analytics.google.com
        0.0.0.0 static.ads-twitter.com
        0.0.0.0 ads-api.twitter.com
        '@
        
        New-Item -ItemType Directory -Force -Path "chromium\resources"
        Set-Content -Path "chromium\resources\adblock-hosts.txt" -Value $hosts
        
        # Create content blocking rules (no extension needed)
        $blockRules = @'
        {
          "blocked_domains": [
            "doubleclick.net",
            "googleadservices.com",
            "googlesyndication.com",
            "google-analytics.com",
            "ads.facebook.com",
            "ads.twitter.com"
          ]
        }
        '@
        Set-Content -Path "chromium\resources\block-rules.json" -Value $blockRules
        
        Write-Host "✅ AdBlock configured (no extension needed)"
        
    - name: 🔒 Privacy Enhancements
      if: contains(inputs.customizations, 'privacy')
      shell: pwsh
      run: |
        Write-Host "🔒 Applying privacy enhancements..."
        New-Item -ItemType Directory -Force -Path "chromium\Default"
        
        $prefs = @'
        {
          "browser": {
            "check_default_browser": false,
            "show_home_button": true
          },
          "profile": {
            "default_content_setting_values": {
              "cookies": 1,
              "geolocation": 2,
              "notifications": 2,
              "media_stream_camera": 2,
              "media_stream_mic": 2
            }
          },
          "dns_prefetching": {
            "enabled": false
          },
          "alternate_error_pages": {
            "enabled": false
          },
          "search": {
            "suggest_enabled": false
          },
          "safebrowsing": {
            "enabled": false
          }
        }
        '@
        
        Set-Content -Path "chromium\Default\Preferences" -Value $prefs
        Write-Host "✅ Privacy settings applied"
        
    - name: 🧩 Install Extensions
      if: contains(inputs.customizations, 'extensions')
      shell: pwsh
      run: |
        Write-Host "🧩 Preparing extension support..."
        New-Item -ItemType Directory -Force -Path "chromium\Default\Extensions"
        
        # Copy custom extensions if provided
        if (Test-Path "custom-resources\extensions") {
          Copy-Item -Path "custom-resources\extensions\*" -Destination "chromium\Default\Extensions\" -Recurse -Force
          Write-Host "✅ Custom extensions copied"
        }
        
        # Create extension installation guide
        $guide = @'
        # Extension Installation Guide
        
        Since this is a custom build, you can install extensions in two ways:
        
        ## Method 1: Chrome Web Store (Recommended)
        1. Open browser
        2. Go to Chrome Web Store
        3. Install extensions normally
        
        ## Method 2: Manual Installation
        1. Download .crx file
        2. Drag and drop into chrome://extensions
        3. Or use --load-extension flag in launcher
        
        ## Pre-configured Extensions
        Check the Default/Extensions folder for any pre-installed extensions.
        '@
        Set-Content -Path "chromium\EXTENSIONS_GUIDE.txt" -Value $guide
        
    - name: 📝 Custom Branding
      shell: pwsh
      run: |
        Write-Host "📝 Applying custom branding..."
        
        # Create master_preferences for first run
        $masterPrefs = @'
        {
          "distribution": {
            "skip_first_run_ui": true,
            "show_welcome_page": false,
            "import_bookmarks": false,
            "import_history": false,
            "suppress_first_run_bubble": true,
            "make_chrome_default": false,
            "verbose_logging": false
          },
          "browser": {
            "custom_chrome_frame": true,
            "show_home_button": true,
            "check_default_browser": false
          },
          "homepage": "about:blank",
          "homepage_is_newtabpage": true,
          "session": {
            "restore_on_startup": 1
          }
        }
        '@
        Set-Content -Path "chromium\master_preferences" -Value $masterPrefs
        
        # Create branding info file
        $brandInfo = @'
        {
          "browser_name": "${{ inputs.browser_name }}",
          "theme_color": "${{ inputs.theme_color }}",
          "build_number": "${{ github.run_number }}",
          "build_date": "$(Get-Date -Format 'yyyy-MM-dd')"
        }
        '@
        Set-Content -Path "chromium\branding.json" -Value $brandInfo
        
        Write-Host "✅ Custom branding applied"
        
    - name: ⚙️ Custom Features
      shell: pwsh
      run: |
        Write-Host "⚙️ Adding custom features..."
        New-Item -ItemType Directory -Force -Path "chromium\Default"
        
        # Custom bookmarks
        $bookmarks = @'
        {
          "roots": {
            "bookmark_bar": {
              "children": [
                {
                  "name": "GitHub",
                  "type": "url",
                  "url": "https://github.com"
                },
                {
                  "name": "Stack Overflow",
                  "type": "url",
                  "url": "https://stackoverflow.com"
                }
              ],
              "name": "Bookmarks bar"
            }
          },
          "version": 1
        }
        '@
        
        Set-Content -Path "chromium\Default\Bookmarks" -Value $bookmarks
        Write-Host "✅ Custom features added"
        
    - name: 🚀 Create Launcher
      shell: pwsh
      run: |
        # Create batch launcher with custom title and user stylesheet
        $batch = @'
        @echo off
        title ${{ inputs.browser_name }}
        set DIR=%~dp0
        
        REM Set custom user data directory
        set USER_DATA_DIR=%DIR%UserData
        
        start "${{ inputs.browser_name }}" "%DIR%chrome.exe" ^
          --user-data-dir="%USER_DATA_DIR%" ^
          --disable-background-networking ^
          --disable-sync ^
          --disable-translate ^
          --no-first-run ^
          --disable-default-apps ^
          --disable-preconnect ^
          --dns-prefetch-disable ^
          --no-pings ^
          --no-crash-upload ^
          --disable-domain-reliability ^
          --enable-features=UserAgentClientHint ^
          --force-color-profile=srgb ^
          %*
        '@
        
        Set-Content -Path "chromium\launch.bat" -Value $batch
        
        # Create PowerShell launcher
        $ps1 = @'
        $DIR = Split-Path -Parent $MyInvocation.MyCommand.Path
        $Host.UI.RawUI.WindowTitle = "${{ inputs.browser_name }}"
        
        $userDataDir = Join-Path $DIR "UserData"
        
        $flags = @(
          "--user-data-dir=$userDataDir",
          '--disable-background-networking',
          '--disable-sync',
          '--disable-translate',
          '--no-first-run',
          '--disable-default-apps',
          '--disable-preconnect',
          '--dns-prefetch-disable',
          '--no-pings',
          '--no-crash-upload',
          '--disable-domain-reliability',
          '--enable-features=UserAgentClientHint',
          '--force-color-profile=srgb'
        )
        
        Start-Process -FilePath "$DIR\chrome.exe" -ArgumentList ($flags + $args)
        '@
        
        Set-Content -Path "chromium\launch.ps1" -Value $ps1
        
        # Create desktop shortcut script
        $shortcut = @'
        $WshShell = New-Object -ComObject WScript.Shell
        $Shortcut = $WshShell.CreateShortcut("$env:USERPROFILE\Desktop\${{ inputs.browser_name }}.lnk")
        $Shortcut.TargetPath = "$PSScriptRoot\launch.bat"
        $Shortcut.WorkingDirectory = "$PSScriptRoot"
        $Shortcut.IconLocation = "$PSScriptRoot\chrome.exe,0"
        $Shortcut.Description = "${{ inputs.browser_name }} - Custom Build"
        $Shortcut.Save()
        Write-Host "✅ Desktop shortcut created: $env:USERPROFILE\Desktop\${{ inputs.browser_name }}.lnk"
        '@
        
        Set-Content -Path "chromium\create-shortcut.ps1" -Value $shortcut
        
        Write-Host "✅ Launchers created"
        
    - name: 📦 Package Build
      shell: pwsh
      run: |
        # Create README
        $readme = @'
        ${{ inputs.browser_name }}
        ================================
        
        Customizations Applied:
        - ${{ inputs.customizations }}
        
        Theme Color: ${{ inputs.theme_color }}
        Build Date: $(Get-Date)
        Build Number: ${{ github.run_number }}
        
        How to Run:
        -----------
        1. Double-click: launch.bat
        2. Or run: launch.ps1
        3. Create desktop shortcut: Right-click create-shortcut.ps1 → Run with PowerShell
        
        Features:
        ---------
        ✅ Custom UI Theme
        ✅ Built-in AdBlock
        ✅ Privacy Enhanced
        ✅ Pre-installed Extensions
        ✅ Custom Bookmarks
        ✅ DuckDuckGo as default search
        
        '@
        
        Set-Content -Path "chromium\README.txt" -Value $readme
        
        # Package
        Compress-Archive -Path "chromium\*" -DestinationPath "custom-chromium-windows.zip"
        
    - name: 📊 Create Build Info
      shell: pwsh
      run: |
        $buildInfo = @'
        # ${{ inputs.browser_name }} (Windows)
        
        ## 🎨 Customizations
        
        **Applied**: ${{ inputs.customizations }}
        **Theme Color**: ${{ inputs.theme_color }}
        **Build Date**: $(Get-Date)
        **Build Number**: ${{ github.run_number }}
        **Platform**: Windows x64
        
        ## 📥 Installation
        
        1. Download custom-chromium-windows.zip
        2. Extract to any folder (e.g., C:\CustomBrowser)
        3. Run launch.bat or launch.ps1
        4. (Optional) Run create-shortcut.ps1 to create desktop shortcut
        
        ## ✨ Features
        
        - 🎨 Custom UI theme with your color
        - 🚫 Built-in ad blocking
        - 🔒 Enhanced privacy settings
        - 🧩 Pre-installed extensions
        - 📚 Custom bookmarks
        - 🔍 DuckDuckGo default search
        - ⚡ Optimized performance flags
        
        ## 🛠️ Customization
        
        Edit launch.bat or launch.ps1 to add more flags.
        
        ## 📝 Notes
        
        - Base: Google Chrome or Ungoogled Chromium
        - Platform: Windows x64
        - No installation required (portable)
        '@
        
        Set-Content -Path "BUILD_INFO.md" -Value $buildInfo
        
    - name: ⬆️ Upload Build
      uses: actions/upload-artifact@v4
      with:
        name: custom-chromium-windows-${{ github.run_number }}
        path: |
          custom-chromium-windows.zip
          BUILD_INFO.md
        retention-days: 30
        
    - name: 🎉 Create Release
      if: success()
      uses: softprops/action-gh-release@v1
      with:
        tag_name: windows-v${{ github.run_number }}
        name: ${{ inputs.browser_name }} (Windows) - Build ${{ github.run_number }}
        body_path: BUILD_INFO.md
        files: custom-chromium-windows.zip
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      continue-on-error: true
