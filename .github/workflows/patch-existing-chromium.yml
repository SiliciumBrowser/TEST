name: 🎨 Custom Chromium Builder

on:
  workflow_dispatch:
    inputs:
      customizations:
        description: 'Tùy chỉnh (chọn nhiều, cách nhau bởi dấu phẩy)'
        required: true
        default: 'ui-theme,adblock,privacy,extensions'
        type: string
      theme_color:
        description: 'Màu chủ đạo (hex code)'
        required: false
        default: '#1a73e8'
        type: string
      browser_name:
        description: 'Tên trình duyệt'
        required: false
        default: 'My Custom Browser'
        type: string

permissions:
  contents: write

jobs:
  build-custom-chromium:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Install tools
      run: |
        sudo apt-get update
        sudo apt-get install -y wget curl tar xz-utils binutils patchelf imagemagick jq
    
    - name: Download Ungoogled Chromium
      run: |
        echo "📥 Downloading Ungoogled Chromium..."
        
        # Thử lấy URL từ GitHub API
        LATEST_URL=$(curl -s https://api.github.com/repos/ungoogled-software/ungoogled-chromium-binaries/releases/latest | grep -o "https://github.com/.*linux.*x86-64\.tar\.xz" | head -1)
        
        # Nếu không có, dùng URL fallback
        if [ -z "$LATEST_URL" ]; then
          echo "⚠️ Không tìm thấy từ API, dùng Google Chrome..."
          wget https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          dpkg-deb -x google-chrome-stable_current_amd64.deb chromium-temp
          mkdir -p chromium
          cp -r chromium-temp/opt/google/chrome/* chromium/
          mv chromium/chrome chromium/chrome 2>/dev/null || mv chromium/google-chrome chromium/chrome
        else
          echo "✅ Tìm thấy: $LATEST_URL"
          wget -O chromium.tar.xz "$LATEST_URL"
          mkdir -p chromium
          tar -xf chromium.tar.xz -C chromium --strip-components=1
        fi
        
    - name: 🎨 Apply UI Theme
      if: contains(inputs.customizations, 'ui-theme')
      run: |
        echo "🎨 Applying custom UI theme..."
        cd chromium
        
        # Tạo custom CSS
        mkdir -p resources/custom
        cat > resources/custom/theme.css << 'EOFCSS'
        /* Custom Theme */
        :root {
          --primary-color: ${{ inputs.theme_color }};
          --accent-color: ${{ inputs.theme_color }};
        }
        
        /* Toolbar */
        #toolbar {
          background: linear-gradient(180deg, var(--primary-color) 0%, #ffffff 100%);
        }
        
        /* Tabs */
        .tab {
          border-radius: 8px 8px 0 0;
        }
        
        .tab.active {
          background: var(--primary-color);
          color: white;
        }
        
        /* Address bar */
        #omnibox {
          border: 2px solid var(--primary-color);
          border-radius: 24px;
        }
        EOFCSS
        
        echo "✅ Theme applied"
        
    - name: 🚫 Add AdBlock
      if: contains(inputs.customizations, 'adblock')
      run: |
        echo "� Adding AdBlock functionality..."
        cd chromium
        
        # Download uBlock Origin
        mkdir -p Default/Extensions/ublock-origin
        UBLOCK_URL=$(curl -s https://api.github.com/repos/gorhill/uBlock/releases/latest | grep "browser_download_url.*chromium.zip" | cut -d '"' -f 4)
        
        if [ ! -z "$UBLOCK_URL" ]; then
          wget -O ublock.zip "$UBLOCK_URL"
          unzip -q ublock.zip -d Default/Extensions/ublock-origin
          echo "✅ uBlock Origin installed"
        fi
        
        # Tạo hosts file để block ads
        cat > resources/adblock-hosts.txt << 'EOFHOSTS'
        # Ad servers
        0.0.0.0 doubleclick.net
        0.0.0.0 googleadservices.com
        0.0.0.0 googlesyndication.com
        0.0.0.0 google-analytics.com
        0.0.0.0 ads.facebook.com
        0.0.0.0 ads.twitter.com
        EOFHOSTS
        
    - name: 🔒 Privacy Enhancements
      if: contains(inputs.customizations, 'privacy')
      run: |
        echo "🔒 Applying privacy enhancements..."
        cd chromium
        
        # Tạo privacy preferences
        mkdir -p Default
        cat > Default/Preferences << 'EOFJSON'
        {
          "browser": {
            "check_default_browser": false,
            "show_home_button": true
          },
          "profile": {
            "default_content_setting_values": {
              "cookies": 1,
              "geolocation": 2,
              "notifications": 2,
              "media_stream_camera": 2,
              "media_stream_mic": 2
            }
          },
          "dns_prefetching": {
            "enabled": false
          },
          "alternate_error_pages": {
            "enabled": false
          },
          "search": {
            "suggest_enabled": false
          },
          "safebrowsing": {
            "enabled": false
          }
        }
        EOFJSON
        
        echo "✅ Privacy settings applied"
        
    - name: 🧩 Install Extensions
      if: contains(inputs.customizations, 'extensions')
      run: |
        echo "🧩 Installing extensions..."
        cd chromium
        mkdir -p Default/Extensions
        
        # Copy custom extensions nếu có
        if [ -d "../custom-resources/extensions" ]; then
          cp -r ../custom-resources/extensions/* Default/Extensions/
          echo "✅ Custom extensions installed"
        fi
        
        # Tạo external_extensions.json để auto-load extensions
        cat > Default/external_extensions.json << 'EOFJSON'
        {
          "update_url": "https://clients2.google.com/service/update2/crx"
        }
        EOFJSON
        
    - name: 📝 Custom Branding
      run: |
        echo "📝 Applying custom branding..."
        cd chromium
        
        # Thay đổi product name
        echo "${{ inputs.browser_name }}" > product_name.txt
        
        # Tạo custom icon nếu có
        if [ -f "../custom-resources/icons/logo.png" ]; then
          cp ../custom-resources/icons/logo.png resources/
          echo "✅ Custom logo applied"
        fi
        
    - name: ⚙️ Custom Features
      run: |
        echo "⚙️ Adding custom features..."
        cd chromium
        
        # Tạo custom bookmarks
        mkdir -p Default
        cat > Default/Bookmarks << 'EOFJSON'
        {
          "roots": {
            "bookmark_bar": {
              "children": [
                {
                  "name": "GitHub",
                  "type": "url",
                  "url": "https://github.com"
                },
                {
                  "name": "Stack Overflow",
                  "type": "url",
                  "url": "https://stackoverflow.com"
                },
                {
                  "name": "Developer Tools",
                  "type": "folder",
                  "children": [
                    {
                      "name": "Chrome DevTools",
                      "type": "url",
                      "url": "chrome://inspect"
                    },
                    {
                      "name": "Extensions",
                      "type": "url",
                      "url": "chrome://extensions"
                    }
                  ]
                }
              ],
              "name": "Bookmarks bar"
            }
          },
          "version": 1
        }
        EOFJSON
        
        # Tạo custom search engines
        cat > Default/search_engines.json << 'EOFJSON'
        {
          "default_search_provider_data": {
            "template_url_data": {
              "short_name": "DuckDuckGo",
              "keyword": "duckduckgo.com",
              "url": "https://duckduckgo.com/?q={searchTerms}"
            }
          }
        }
        EOFJSON
        
        echo "✅ Custom features added"
        
    - name: 🚀 Create Launcher
      run: |
        cd chromium
        
        # Tạo launcher script với custom flags
        cat > launch.sh << 'EOFSCRIPT'
        #!/bin/bash
        DIR="$( cd "$( dirname "${BASH_SOURCE[0]}" )" && pwd )"
        
        # Custom flags
        FLAGS=(
          --disable-background-networking
          --disable-sync
          --disable-translate
          --no-first-run
          --disable-default-apps
          --disable-preconnect
          --dns-prefetch-disable
          --no-pings
          --no-crash-upload
          --disable-domain-reliability
        )
        
        "$DIR/chrome" "${FLAGS[@]}" "$@"
        EOFSCRIPT
        chmod +x launch.sh
        
        # Tạo desktop entry
        cat > custom-browser.desktop << EOFDESKTOP
        [Desktop Entry]
        Version=1.0
        Name=${{ inputs.browser_name }}
        Comment=Custom Chromium Browser
        Exec=$PWD/launch.sh %U
        Terminal=false
        Icon=$PWD/product_logo_256.png
        Type=Application
        Categories=Network;WebBrowser;
        MimeType=text/html;text/xml;application/xhtml+xml;
        EOFDESKTOP
        
    - name: 📦 Package Build
      run: |
        cd chromium
        
        # Tạo README
        cat > README.txt << EOFREADME
        ${{ inputs.browser_name }}
        ================================
        
        Customizations Applied:
        - ${{ inputs.customizations }}
        
        Theme Color: ${{ inputs.theme_color }}
        Build Date: $(date)
        Build Number: ${{ github.run_number }}
        
        How to Run:
        -----------
        ./launch.sh
        
        Or double-click: custom-browser.desktop
        
        Features:
        ---------
        ✅ Custom UI Theme
        ✅ Built-in AdBlock
        ✅ Privacy Enhanced
        ✅ Pre-installed Extensions
        ✅ Custom Bookmarks
        ✅ DuckDuckGo as default search
        
        EOFREADME
        
        # Package
        cd ..
        tar -czf custom-chromium.tar.gz chromium/
        
    - name: 📊 Create Build Info
      run: |
        cat > BUILD_INFO.md << EOFINFO
        # ${{ inputs.browser_name }}
        
        ## 🎨 Customizations
        
        **Applied**: ${{ inputs.customizations }}
        **Theme Color**: ${{ inputs.theme_color }}
        **Build Date**: $(date)
        **Build Number**: ${{ github.run_number }}
        
        ## 📥 Installation
        
        \`\`\`bash
        # Extract
        tar -xzf custom-chromium.tar.gz
        cd chromium
        
        # Run
        ./launch.sh
        
        # Or install desktop entry
        cp custom-browser.desktop ~/.local/share/applications/
        \`\`\`
        
        ## ✨ Features
        
        - 🎨 Custom UI theme with your color
        - 🚫 Built-in ad blocking
        - 🔒 Enhanced privacy settings
        - 🧩 Pre-installed extensions
        - 📚 Custom bookmarks
        - 🔍 DuckDuckGo default search
        - ⚡ Optimized performance flags
        
        ## 🛠️ Customization
        
        Edit \`launch.sh\` to add more flags or change behavior.
        
        ## 📝 Notes
        
        Base: Ungoogled Chromium (or Google Chrome)
        Platform: Linux x86-64
        EOFINFO
        
    - name: ⬆️ Upload Build
      uses: actions/upload-artifact@v4
      with:
        name: custom-chromium-${{ github.run_number }}
        path: |
          custom-chromium.tar.gz
          BUILD_INFO.md
        retention-days: 30
        
    - name: 🎉 Create Release
      if: success()
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ github.run_number }}
        name: ${{ inputs.browser_name }} - Build ${{ github.run_number }}
        body_path: BUILD_INFO.md
        files: custom-chromium.tar.gz
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      continue-on-error: true
