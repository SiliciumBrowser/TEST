name: 🚀 Build Custom Chromium (Reuse Prebuilt)

on:
  workflow_dispatch:
    inputs:
      base_source:
        description: 'Nguồn base build'
        required: true
        default: 'ungoogled-chromium'
        type: choice
        options:
          - ungoogled-chromium
          - google-chrome
          - chromium-official
      custom_patches:
        description: 'Áp dụng custom patches'
        required: false
        default: 'true'
        type: boolean

permissions:
  contents: write

jobs:
  build-custom:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Maximize build space
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc
        sudo rm -rf /usr/local/share/boost
        df -h
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y wget curl tar xz-utils python3 python3-pip git
    
    - name: Download base Ungoogled Chromium
      if: inputs.base_source == 'ungoogled-chromium'
      run: |
        echo "📥 Downloading Ungoogled Chromium..."
        
        # Thử lấy URL từ GitHub API
        LATEST_URL=$(curl -s https://api.github.com/repos/ungoogled-software/ungoogled-chromium-binaries/releases/latest | grep -o "https://github.com/.*linux.*x86-64\.tar\.xz" | head -1)
        
        if [ -z "$LATEST_URL" ]; then
          echo "⚠️ Không tìm thấy Ungoogled Chromium, dùng Chromium snapshot..."
          wget -O chromium-base.zip "https://download-chromium.appspot.com/dl/Linux_x64?type=snapshots"
          unzip -q chromium-base.zip -d chromium-base
        else
          echo "✅ Tìm thấy: $LATEST_URL"
          wget -O chromium-base.tar.xz "$LATEST_URL"
          mkdir -p chromium-base
          tar -xf chromium-base.tar.xz -C chromium-base --strip-components=1
        fi
        
    - name: Download Google Chrome
      if: inputs.base_source == 'google-chrome'
      run: |
        echo "📥 Downloading Google Chrome..."
        wget https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
        dpkg-deb -x google-chrome-stable_current_amd64.deb chromium-base
        
    - name: Download Official Chromium
      if: inputs.base_source == 'chromium-official'
      run: |
        echo "📥 Downloading Official Chromium..."
        wget https://download-chromium.appspot.com/dl/Linux_x64?type=snapshots -O chromium.zip
        unzip chromium.zip -d chromium-base
    
    - name: Setup depot_tools (for patching)
      if: inputs.custom_patches == true
      run: |
        git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git
        echo "$PWD/depot_tools" >> $GITHUB_PATH
        
    - name: Apply custom patches
      if: inputs.custom_patches == true
      run: |
        echo "🔧 Applying custom modifications..."
        # Tạo thư mục cho custom patches
        mkdir -p custom-patches
        
        # Ví dụ: Thay đổi user agent, branding, etc.
        # Bạn có thể thêm patches vào thư mục custom-patches/
        
    - name: Repackage with modifications
      run: |
        echo "📦 Creating custom build..."
        mkdir -p custom-chromium
        
        # Copy base files
        cp -r chromium-base/* custom-chromium/
        
        # Thêm custom resources nếu có
        if [ -d "custom-resources" ]; then
          cp -r custom-resources/* custom-chromium/
        fi
        
        # Tạo build info
        cat > custom-chromium/BUILD_INFO.txt << EOF
        Base Source: ${{ inputs.base_source }}
        Build Date: $(date)
        Custom Patches: ${{ inputs.custom_patches }}
        GitHub Run: ${{ github.run_number }}
        EOF
        
    - name: Create final package
      run: |
        cd custom-chromium
        tar -czf ../custom-chromium-linux-x64.tar.gz *
        
    - name: Upload custom build
      uses: actions/upload-artifact@v4
      with:
        name: custom-chromium-build
        path: custom-chromium-linux-x64.tar.gz
        retention-days: 30
        
    - name: Create Release
      if: github.ref == 'refs/heads/main' && success()
      uses: softprops/action-gh-release@v1
      with:
        tag_name: custom-build-${{ github.run_number }}
        name: Custom Chromium Build ${{ github.run_number }}
        body: |
          🎉 Custom Chromium Build
          
          **Base Source**: ${{ inputs.base_source }}
          **Custom Patches**: ${{ inputs.custom_patches }}
          **Build Date**: $(date)
          
          Download và giải nén:
          ```bash
          tar -xzf custom-chromium-linux-x64.tar.gz
          cd chrome
          ./chrome
          ```
        files: custom-chromium-linux-x64.tar.gz
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      continue-on-error: true
