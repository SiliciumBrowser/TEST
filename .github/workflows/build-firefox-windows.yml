name: Build Firefox (Windows)

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 240
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Setup cache directories
      shell: powershell
      run: |
        Write-Host "Creating cache directories..."
        New-Item -ItemType Directory -Force -Path "$env:USERPROFILE\.mozbuild" | Out-Null
        New-Item -ItemType Directory -Force -Path "$env:LOCALAPPDATA\mozilla-build" | Out-Null
        Write-Host "Cache directories created"
    
    - name: Cache Mozilla Build dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~\.mozbuild\srcdirs
          ~\.cargo
          ~\.rustup
        key: mozbuild-deps-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          mozbuild-deps-${{ runner.os }}-
    
    - name: Cache ccache
      uses: actions/cache@v4
      with:
        path: ~\.ccache
        key: ccache-${{ runner.os }}-${{ github.run_number }}
        restore-keys: |
          ccache-${{ runner.os }}-
    
    - name: Check disk space
      shell: powershell
      run: |
        Write-Host "Disk space before cleanup:"
        Get-PSDrive C | Select-Object Used,Free
    
    - name: Free up disk space
      shell: powershell
      run: |
        Write-Host "Removing unnecessary components..."
        
        if (Test-Path "C:\Android") {
          Remove-Item -Path "C:\Android" -Recurse -Force -ErrorAction SilentlyContinue
        }
        
        if (Test-Path "C:\Program Files\dotnet") {
          Remove-Item -Path "C:\Program Files\dotnet" -Recurse -Force -ErrorAction SilentlyContinue
        }
        
        if (Test-Path "$env:LOCALAPPDATA\Temp") {
          Remove-Item -Path "$env:LOCALAPPDATA\Temp\*" -Recurse -Force -ErrorAction SilentlyContinue
        }
        
        Write-Host "Disk space after cleanup:"
        Get-PSDrive C | Select-Object Used,Free
    
    - name: Install Mozilla Build Tools
      shell: powershell
      run: |
        Write-Host "Downloading MozillaBuild..."
        $url = "https://ftp.mozilla.org/pub/mozilla/libraries/win32/MozillaBuildSetup-Latest.exe"
        $output = "MozillaBuildSetup.exe"
        
        Invoke-WebRequest -Uri $url -OutFile $output -UseBasicParsing
        
        Write-Host "Installing MozillaBuild..."
        Start-Process -FilePath $output -ArgumentList "/S" -Wait
        
        Write-Host "MozillaBuild installed"
    
    - name: Clone Firefox source
      shell: powershell
      run: |
        Write-Host "Cloning Firefox Release source..."
        
        # Use Mozilla Build environment
        $env:PATH = "C:\mozilla-build\python3;C:\mozilla-build\msys2\usr\bin;$env:PATH"
        
        # Clone Firefox Release (stable) instead of Nightly
        # mozilla-release = stable release branch
        git clone --depth 1 --branch release https://github.com/mozilla/gecko-dev.git firefox
        
        Write-Host "Firefox Release source cloned"
    
    - name: Bootstrap Firefox
      shell: cmd
      run: |
        echo Bootstrapping Firefox...
        cd firefox
        C:\mozilla-build\start-shell.bat -c "python3 ./mach bootstrap --application-choice=browser --no-interactive"
    
    - name: Install cbindgen
      shell: powershell
      run: |
        Write-Host "Installing cbindgen..."
        
        # Use cargo to install cbindgen
        $env:PATH = "$env:USERPROFILE\.cargo\bin;$env:PATH"
        
        cargo install cbindgen
        
        # Verify installation
        cbindgen --version
        
        Write-Host "cbindgen installed successfully"
    
    - name: Download Windows Rust crate
      shell: powershell
      run: |
        Write-Host "Downloading Windows Rust crate..."
        
        # Install cargo-download if not present
        $env:PATH = "$env:USERPROFILE\.cargo\bin;$env:PATH"
        
        cargo install cargo-download
        
        # Download windows crate
        cargo download -x windows=0.58.0
        
        # Set environment variable
        $windowsDir = Get-ChildItem -Directory -Filter "windows-0.58.0" | Select-Object -First 1
        if ($windowsDir) {
          $fullPath = $windowsDir.FullName
          Write-Host "Windows crate downloaded to: $fullPath"
          echo "MOZ_WINDOWS_RS_DIR=$fullPath" >> $env:GITHUB_ENV
        } else {
          Write-Host "ERROR: Windows crate directory not found"
          exit 1
        }
    
    - name: Setup Silicium Branding
      shell: powershell
      run: |
        Write-Host "Setting up Silicium branding..."
        
        # Create branding directory
        $brandingDir = "firefox\browser\branding\silicium"
        New-Item -ItemType Directory -Force -Path $brandingDir | Out-Null
        New-Item -ItemType Directory -Force -Path "$brandingDir\locales\en-US" | Out-Null
        New-Item -ItemType Directory -Force -Path "$brandingDir\locales\vi" | Out-Null
        New-Item -ItemType Directory -Force -Path "$brandingDir\content" | Out-Null
        
        # Copy branding files
        Write-Host "Copying branding configuration..."
        Copy-Item "custom-resources\branding\configure.sh" "$brandingDir\" -Force
        Copy-Item "custom-resources\branding\branding.nsi" "$brandingDir\" -Force
        
        # Verify configure.sh content
        Write-Host "`nVerifying configure.sh content:"
        Get-Content "$brandingDir\configure.sh"
        
        # Copy locale files
        Write-Host "`nCopying locale files..."
        Copy-Item "custom-resources\branding\locales\en-US\*" "$brandingDir\locales\en-US\" -Force
        Copy-Item "custom-resources\branding\locales\vi\*" "$brandingDir\locales\vi\" -Force
        
        # Copy icons
        Write-Host "Copying icons..."
        Copy-Item "custom-resources\icons\default16.png" "$brandingDir\" -Force
        Copy-Item "custom-resources\icons\default32.png" "$brandingDir\" -Force
        Copy-Item "custom-resources\icons\default48.png" "$brandingDir\" -Force
        Copy-Item "custom-resources\icons\default64.png" "$brandingDir\" -Force
        Copy-Item "custom-resources\icons\default128.png" "$brandingDir\" -Force
        Copy-Item "custom-resources\icons\default256.png" "$brandingDir\" -Force
        Copy-Item "custom-resources\icons\firefox.ico" "$brandingDir\" -Force
        Copy-Item "custom-resources\icons\about.png" "$brandingDir\content\" -Force
        
        Write-Host "Silicium branding setup complete!"
        Write-Host "Branding location: $brandingDir"
    
    - name: Create mozconfig
      shell: powershell
      run: |
        Write-Host "Creating mozconfig..."
        
        $buildType = "${{ github.event.inputs.build_type }}"
        
        $config = ""
        
        if ($buildType -eq "debug") {
          $config += "ac_add_options --enable-debug`n"
          $config += "ac_add_options --disable-optimize`n"
        } else {
          $config += "ac_add_options --enable-optimize`n"
          $config += "ac_add_options --disable-debug`n"
        }
        
        $config += "`n"
        $config += "# Build options`n"
        $config += "ac_add_options --enable-application=browser`n"
        $config += "mk_add_options MOZ_OBJDIR=@TOPSRCDIR@/obj-firefox`n`n"
        $config += "# Enable ccache for faster rebuilds`n"
        $config += "ac_add_options --with-ccache`n"
        $config += "mk_add_options 'export CCACHE_DIR=$env:USERPROFILE\.ccache'`n`n"
        $config += "# Silicium custom branding`n"
        $config += "ac_add_options --with-branding=browser/branding/silicium`n"
        $config += "ac_add_options --with-app-name=silicium`n`n"
        $config += "# Optimizations`n"
        $config += "ac_add_options --disable-tests`n"
        $config += "ac_add_options --disable-crashreporter`n"
        $config += "ac_add_options --disable-updater`n"
        $config += "ac_add_options --disable-maintenance-service`n"
        $config += "ac_add_options --without-wasm-sandboxed-libraries`n`n"
        $config += "# Features`n"
        $config += "ac_add_options --enable-release`n"
        
        Set-Content -Path "firefox\mozconfig" -Value $config
        
        Write-Host "mozconfig created:"
        Get-Content "firefox\mozconfig"
    
    - name: Setup ccache
      shell: powershell
      run: |
        Write-Host "Setting up ccache..."
        
        # Set ccache environment
        $env:CCACHE_DIR = "$env:USERPROFILE\.ccache"
        $env:CCACHE_MAXSIZE = "5G"
        $env:CCACHE_COMPRESS = "1"
        
        # Check if ccache exists in Mozilla Build
        $ccachePath = "C:\mozilla-build\msys2\usr\bin\ccache.exe"
        if (Test-Path $ccachePath) {
          Write-Host "ccache found at $ccachePath"
          & $ccachePath --version
          & $ccachePath --show-stats
        } else {
          Write-Host "ccache not found, will be installed by bootstrap"
        }
    
    - name: Build Firefox
      shell: powershell
      timeout-minutes: 180
      run: |
        Write-Host "Building Firefox..."
        Write-Host "This may take 2-3 hours (first build) or 30-60 min (cached)..."
        
        cd firefox
        
        # Check mozconfig exists
        if (-not (Test-Path "mozconfig")) {
          Write-Host "ERROR: mozconfig not found!"
          exit 1
        }
        
        Write-Host "mozconfig content:"
        Get-Content mozconfig
        
        # Build using mach
        Write-Host "`nStarting build at $(Get-Date)..."
        
        # Use Mozilla Build environment
        $env:MOZILLABUILD = "C:\mozilla-build"
        $env:PATH = "C:\mozilla-build\python3;C:\mozilla-build\msys2\usr\bin;$env:PATH"
        
        # Set ccache environment
        $env:CCACHE_DIR = "$env:USERPROFILE\.ccache"
        $env:CCACHE_MAXSIZE = "5G"
        $env:CCACHE_COMPRESS = "1"
        
        # Run mach build
        python3 mach build
        
        if ($LASTEXITCODE -ne 0) {
          Write-Host "ERROR: Build failed with exit code $LASTEXITCODE"
          exit 1
        }
        
        Write-Host "Build completed at $(Get-Date)"
        
        # Show ccache stats
        Write-Host "`nccache statistics:"
        $ccachePath = "C:\mozilla-build\msys2\usr\bin\ccache.exe"
        if (Test-Path $ccachePath) {
          & $ccachePath --show-stats
        }
    
    - name: Package Firefox
      shell: powershell
      run: |
        Write-Host "Packaging Firefox..."
        
        cd firefox
        
        # Check if build completed
        if (-not (Test-Path "obj-firefox")) {
          Write-Host "ERROR: obj-firefox directory not found!"
          Write-Host "Build did not complete successfully."
          exit 1
        }
        
        # Use Mozilla Build environment
        $env:MOZILLABUILD = "C:\mozilla-build"
        $env:PATH = "C:\mozilla-build\python3;C:\mozilla-build\msys2\usr\bin;$env:PATH"
        
        # Create installer package
        Write-Host "Creating installer package..."
        python3 mach package
        
        # Also create a portable package manually
        Write-Host "Creating portable package..."
        $distPath = "obj-firefox\dist\bin"
        
        if (Test-Path $distPath) {
          Write-Host "Found dist\bin directory"
          
          # Create portable folder
          New-Item -ItemType Directory -Force -Path "..\firefox-portable" | Out-Null
          
          # Copy all files
          Write-Host "Copying browser files..."
          Copy-Item -Path "$distPath\*" -Destination "..\firefox-portable\" -Recurse -Force
          
          # Create portable package
          Write-Host "Creating ZIP..."
          Compress-Archive -Path "..\firefox-portable\*" -DestinationPath "..\silicium-browser-firefox-portable.zip" -Force
          
          $size = (Get-Item "..\silicium-browser-firefox-portable.zip").Length / 1MB
          Write-Host "Portable package size: $([math]::Round($size, 2)) MB"
        } else {
          Write-Host "ERROR: dist\bin not found at $distPath"
          exit 1
        }
        
        Write-Host "Firefox packaged successfully"
    
    - name: Copy artifacts
      shell: powershell
      run: |
        Write-Host "Copying artifacts..."
        
        # Check for portable package first
        if (Test-Path "silicium-browser-firefox-portable.zip") {
          Write-Host "Found portable package"
          $size = (Get-Item "silicium-browser-firefox-portable.zip").Length / 1MB
          Write-Host "Portable package size: $([math]::Round($size, 2)) MB"
        } else {
          Write-Host "ERROR: Portable package not found!"
          
          # Try to find any package in dist
          Write-Host "Looking for packages in firefox\obj-firefox\dist..."
          if (Test-Path "firefox\obj-firefox\dist") {
            Get-ChildItem "firefox\obj-firefox\dist" -Recurse -File | ForEach-Object {
              Write-Host "  Found: $($_.FullName) - $([math]::Round($_.Length / 1MB, 2)) MB"
            }
          }
          
          exit 1
        }
    
    - name: Show cache statistics
      shell: powershell
      run: |
        Write-Host "Build cache statistics:"
        
        # ccache stats
        $ccachePath = "C:\mozilla-build\msys2\usr\bin\ccache.exe"
        if (Test-Path $ccachePath) {
          Write-Host "`nccache stats:"
          & $ccachePath --show-stats
        }
        
        # Cache directory sizes
        Write-Host "`nCache directory sizes:"
        
        if (Test-Path "$env:USERPROFILE\.ccache") {
          $size = (Get-ChildItem "$env:USERPROFILE\.ccache" -Recurse -ErrorAction SilentlyContinue | Measure-Object -Property Length -Sum).Sum / 1GB
          Write-Host "ccache: $([math]::Round($size, 2)) GB"
        }
        
        if (Test-Path "$env:USERPROFILE\.cargo") {
          $size = (Get-ChildItem "$env:USERPROFILE\.cargo" -Recurse -ErrorAction SilentlyContinue | Measure-Object -Property Length -Sum).Sum / 1GB
          Write-Host "Cargo: $([math]::Round($size, 2)) GB"
        }
        
        if (Test-Path "$env:USERPROFILE\.mozbuild") {
          $size = (Get-ChildItem "$env:USERPROFILE\.mozbuild" -Recurse -ErrorAction SilentlyContinue | Measure-Object -Property Length -Sum).Sum / 1GB
          Write-Host "mozbuild: $([math]::Round($size, 2)) GB"
        }
    
    - name: Upload Silicium Browser
      uses: actions/upload-artifact@v4
      with:
        name: silicium-browser-${{ github.event.inputs.build_type }}
        path: silicium-browser-firefox-portable.zip
        retention-days: 30
    
    - name: Create Release
      if: github.event_name == 'workflow_dispatch'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v1.0.0-${{ github.run_number }}
        name: Silicium Browser v1.0.0-${{ github.run_number }}
        body: |
          ## 🔥 Silicium Browser - Release Build
          
          **Build Type:** ${{ github.event.inputs.build_type }}
          **Platform:** Windows x64
          **Based on:** Mozilla Firefox (Release branch)
          
          ### ✨ Features
          - 🔥 Custom purple flame branding
          - 🎨 Silicium name and icons
          - 🦊 Based on stable Firefox Release
          
          ### 📦 Installation
          1. Download `silicium-browser-firefox-portable.zip`
          2. Extract to any folder
          3. Run `firefox.exe` (will be renamed to `silicium.exe` in future builds)
          
          ### 🚀 Next Steps
          - Remove Mozilla tracking
          - Add privacy features
          - Implement custom UI
          
          **Note:** This is an early build. More features coming soon!
        files: silicium-browser-firefox-portable.zip
        draft: false
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
