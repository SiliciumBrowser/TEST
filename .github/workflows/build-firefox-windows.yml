name: Build Firefox (Windows)

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 240
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Check disk space
      shell: powershell
      run: |
        Write-Host "Disk space before cleanup:"
        Get-PSDrive C | Select-Object Used,Free
    
    - name: Free up disk space
      shell: powershell
      run: |
        Write-Host "Removing unnecessary components..."
        
        if (Test-Path "C:\Android") {
          Remove-Item -Path "C:\Android" -Recurse -Force -ErrorAction SilentlyContinue
        }
        
        if (Test-Path "C:\Program Files\dotnet") {
          Remove-Item -Path "C:\Program Files\dotnet" -Recurse -Force -ErrorAction SilentlyContinue
        }
        
        if (Test-Path "$env:LOCALAPPDATA\Temp") {
          Remove-Item -Path "$env:LOCALAPPDATA\Temp\*" -Recurse -Force -ErrorAction SilentlyContinue
        }
        
        Write-Host "Disk space after cleanup:"
        Get-PSDrive C | Select-Object Used,Free
    
    - name: Install Mozilla Build Tools
      shell: powershell
      run: |
        Write-Host "Downloading MozillaBuild..."
        $url = "https://ftp.mozilla.org/pub/mozilla/libraries/win32/MozillaBuildSetup-Latest.exe"
        $output = "MozillaBuildSetup.exe"
        
        Invoke-WebRequest -Uri $url -OutFile $output -UseBasicParsing
        
        Write-Host "Installing MozillaBuild..."
        Start-Process -FilePath $output -ArgumentList "/S" -Wait
        
        Write-Host "MozillaBuild installed"
    
    - name: Clone Firefox source
      shell: powershell
      run: |
        Write-Host "Cloning Firefox source..."
        
        # Use Mozilla Build environment
        $env:PATH = "C:\mozilla-build\python3;C:\mozilla-build\msys2\usr\bin;$env:PATH"
        
        # Clone Firefox
        git clone --depth 1 https://github.com/mozilla/gecko-dev.git firefox
        
        Write-Host "Firefox source cloned"
    
    - name: Bootstrap Firefox
      shell: cmd
      run: |
        echo Bootstrapping Firefox...
        cd firefox
        C:\mozilla-build\start-shell.bat -c "python3 ./mach bootstrap --application-choice=browser --no-interactive"
    
    - name: Create mozconfig
      shell: powershell
      run: |
        Write-Host "Creating mozconfig..."
        
        $buildType = "${{ github.event.inputs.build_type }}"
        
        $config = ""
        
        if ($buildType -eq "debug") {
          $config += "ac_add_options --enable-debug`n"
          $config += "ac_add_options --disable-optimize`n"
        } else {
          $config += "ac_add_options --enable-optimize`n"
          $config += "ac_add_options --disable-debug`n"
        }
        
        $config += "`n"
        $config += "# Build options`n"
        $config += "ac_add_options --enable-application=browser`n"
        $config += "mk_add_options MOZ_OBJDIR=@TOPSRCDIR@/obj-firefox`n`n"
        $config += "# Branding`n"
        $config += "ac_add_options --with-branding=browser/branding/unofficial`n`n"
        $config += "# Optimizations`n"
        $config += "ac_add_options --disable-tests`n"
        $config += "ac_add_options --disable-crashreporter`n"
        $config += "ac_add_options --disable-updater`n"
        $config += "ac_add_options --disable-maintenance-service`n`n"
        $config += "# Features`n"
        $config += "ac_add_options --enable-release`n"
        
        Set-Content -Path "firefox\mozconfig" -Value $config
        
        Write-Host "mozconfig created:"
        Get-Content "firefox\mozconfig"
    
    - name: Build Firefox
      shell: powershell
      timeout-minutes: 180
      run: |
        Write-Host "Building Firefox..."
        Write-Host "This may take 2-3 hours..."
        
        cd firefox
        
        # Check mozconfig exists
        if (-not (Test-Path "mozconfig")) {
          Write-Host "ERROR: mozconfig not found!"
          exit 1
        }
        
        Write-Host "mozconfig content:"
        Get-Content mozconfig
        
        # Build using mach
        Write-Host "`nStarting build at $(Get-Date)..."
        
        # Use Mozilla Build environment
        $env:MOZILLABUILD = "C:\mozilla-build"
        $env:PATH = "C:\mozilla-build\python3;C:\mozilla-build\msys2\usr\bin;$env:PATH"
        
        # Run mach build
        python3 mach build
        
        if ($LASTEXITCODE -ne 0) {
          Write-Host "ERROR: Build failed with exit code $LASTEXITCODE"
          exit 1
        }
        
        Write-Host "Build completed at $(Get-Date)"
    
    - name: Package Firefox
      shell: powershell
      run: |
        Write-Host "Packaging Firefox..."
        
        cd firefox
        
        # Check if build completed
        if (-not (Test-Path "obj-firefox")) {
          Write-Host "ERROR: obj-firefox directory not found!"
          Write-Host "Build did not complete successfully."
          exit 1
        }
        
        # Use Mozilla Build environment
        $env:MOZILLABUILD = "C:\mozilla-build"
        $env:PATH = "C:\mozilla-build\python3;C:\mozilla-build\msys2\usr\bin;$env:PATH"
        
        # Run mach package
        Write-Host "Running mach package..."
        python3 mach package
        
        if ($LASTEXITCODE -ne 0) {
          Write-Host "ERROR: Package failed with exit code $LASTEXITCODE"
          exit 1
        }
        
        Write-Host "Firefox packaged successfully"
    
    - name: Copy artifacts
      shell: powershell
      run: |
        Write-Host "Copying artifacts..."
        
        # Check if build completed
        if (-not (Test-Path "firefox\obj-firefox")) {
          Write-Host "ERROR: Build directory obj-firefox not found!"
          Write-Host "Build may have failed. Check previous step logs."
          exit 1
        }
        
        # Find the package
        $distPath = "firefox\obj-firefox\dist"
        
        if (-not (Test-Path $distPath)) {
          Write-Host "ERROR: dist directory not found at $distPath"
          Write-Host "Build did not complete successfully."
          exit 1
        }
        
        Write-Host "Looking for package in $distPath..."
        $package = Get-ChildItem -Path $distPath -Filter "*.zip" -ErrorAction SilentlyContinue | Select-Object -First 1
        
        if ($package) {
          Write-Host "Found package: $($package.Name)"
          Copy-Item $package.FullName "silicium-browser-firefox.zip"
          
          $size = (Get-Item "silicium-browser-firefox.zip").Length / 1MB
          Write-Host "Package size: $([math]::Round($size, 2)) MB"
        } else {
          Write-Host "ERROR: No ZIP package found in $distPath"
          Write-Host "Available files:"
          Get-ChildItem $distPath -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "  $($_.Name)" }
          exit 1
        }
    
    - name: Upload Firefox browser
      uses: actions/upload-artifact@v4
      with:
        name: silicium-browser-firefox-${{ github.event.inputs.build_type }}
        path: silicium-browser-firefox.zip
        retention-days: 30
    
    - name: Create Release
      if: github.event_name == 'workflow_dispatch'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: firefox-v1.0.0-${{ github.run_number }}
        name: SiliciumBrowser Firefox v1.0.0-${{ github.run_number }}
        body: |
          ## SiliciumBrowser Firefox Build
          
          **Build Type:** ${{ github.event.inputs.build_type }}
          **Platform:** Windows x64
          **Based on:** Mozilla Firefox
          
          ### Installation
          1. Extract silicium-browser-firefox.zip
          2. Run firefox.exe
        files: silicium-browser-firefox.zip
        draft: false
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
