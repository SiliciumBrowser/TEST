<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 300px;
      padding: 20px;
      font-family: Arial, sans-serif;
    }
    h1 {
      font-size: 18px;
      margin: 0 0 10px 0;
    }
    button {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      border: none;
      border-radius: 4px;
      background: #1a73e8;
      color: white;
      cursor: pointer;
    }
    button:hover {
      background: #1557b0;
    }
    .stats {
      margin-top: 15px;
      padding: 10px;
      background: #f5f5f5;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <h1>🎨 Custom Extension</h1>
  
  <button id="clearCache">Clear Cache</button>
  <button id="clearCookies">Clear Cookies</button>
  <button id="toggleAdBlock">Toggle AdBlock</button>
  
  <div class="stats">
    <p>Ads Blocked: <strong id="adsBlocked">0</strong></p>
    <p>Trackers Blocked: <strong id="trackersBlocked">0</strong></p>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
